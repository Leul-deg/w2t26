name: lms_bundle

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: lms
    ports:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend ─────────────────────────────────────────────────────────────────
  # Builds the `dev` stage: golang:1.24 + psql + openssl.
  # Source is bind-mounted so `go test` and `go run` always use current code.
  # Migrations directory is also mounted so MIGRATIONS_PATH is resolvable.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lms_user:changeme@postgres:5432/lms?sslmode=disable
      DATABASE_TEST_URL: postgresql://lms_user:changeme@postgres:5432/lms_test?sslmode=disable
      CRYPTO_KEY_FILE: /tmp/lms-dev.key
      MIGRATIONS_PATH: /workspace/migrations
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SESSION_INACTIVITY_SECONDS: 1800
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/workspace/backend
      - ./migrations:/workspace/migrations
    # 1. Generate a dev crypto key (readiness probe checks for this file).
    # 2. Start the server, which applies pending migrations on the main lms DB.
    #    lms_test is created and migrated separately by run_tests.sh.
    command: >-
      bash -c "
        openssl rand -out /tmp/lms-dev.key 32 &&
        go run ./cmd/server
      "

  # ── Frontend ────────────────────────────────────────────────────────────────
  # Builds the `dev` stage: node:20 (Debian-based, has bash).
  # Source is bind-mounted; node_modules are preserved in an anonymous volume
  # that Docker initialises from the image layer (where `npm ci` ran).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/workspace/frontend
      - /workspace/frontend/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
